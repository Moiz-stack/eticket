<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legislative Theatre 2026 – E-Ticket</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Libre+Barcode+128&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    background: #f4f4f6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    padding: 40px 20px;
    color: #1a1a1a;
  }

  /* TICKET WRAPPER */
  .ticket {
    width: 400px;
    max-width: 100%;
    background: #ffffff;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
    display: flex;
    flex-direction: column;
  }

  /* TOP SECTION */
  .ticket-top {
    padding: 40px 30px 20px;
    position: relative;
    border-bottom: 2px dashed #eaeaea;
  }

  /* Decorative cutouts */
  .ticket-top::before, .ticket-top::after {
    content: '';
    position: absolute;
    bottom: -10px;
    width: 20px;
    height: 20px;
    background: #f4f4f6;
    border-radius: 50%;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
  }
  .ticket-top::before { left: -10px; }
  .ticket-top::after { right: -10px; }

  .org-header {
    text-align: center;
    font-size: 0.65rem;
    color: #888;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .event-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    line-height: 1.1;
    text-align: center;
    color: #111;
    margin-bottom: 5px;
  }

  .event-subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    text-align: center;
    color: #666;
    margin-bottom: 30px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 30px;
  }

  .info-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-label {
    font-size: 0.6rem;
    color: #999;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .info-value {
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: #222;
  }

  .info-value.highlight {
    font-weight: 600;
    color: #c9a84c; /* Subtle gold accent */
  }

  /* BOTTOM SECTION */
  .ticket-bottom {
    padding: 30px;
    background: #fafafb;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .name-section {
    width: 100%;
    margin-bottom: 25px;
    text-align: center;
  }

  .name-label {
    font-size: 0.6rem;
    color: #999;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .attendee-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: #111;
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
    display: inline-block;
    min-width: 200px;
    transition: border-color 0.2s;
  }
  
  .attendee-name:focus {
    border-color: #c9a84c;
    outline: none;
  }

  .attendee-name.blank {
    color: #aaa;
    font-style: italic;
    font-weight: 400;
  }

  .welcome-msg {
    font-size: 0.85rem;
    color: #c9a84c;
    font-style: italic;
    font-family: 'Playfair Display', serif;
    text-align: center;
    margin-bottom: 25px;
  }

  .barcode {
    font-family: 'Libre Barcode 128', cursive;
    font-size: 4rem;
    line-height: 1;
    color: #111;
    margin-bottom: 5px;
  }

  .ticket-id {
    font-size: 0.6rem;
    color: #888;
    letter-spacing: 0.2em;
  }

  /* Action Buttons */
  .actions {
    margin-top: 30px;
    display: flex;
    gap: 15px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: #111;
    color: #fff;
  }
  .btn-primary:hover {
    background: #333;
  }

  .btn-outline {
    background: transparent;
    border-color: #ccc;
    color: #555;
  }
  .btn-outline:hover {
    border-color: #111;
    color: #111;
  }

  @media print {
    body { background: white; padding: 0; }
    .ticket { box-shadow: none; border: 1px solid #eee; }
    .ticket-top::before, .ticket-top::after { background: white; }
    .actions { display: none; }
  }
</style>
</head>
<body>

<div class="ticket">

  <div class="ticket-top">
    <div class="org-header">UCP Law Society × UCP Faculty of Law</div>
    
    <div class="event-title">Legislative<br>Theatre</div>
    <div class="event-subtitle">بلا عنوان ۵ · Untitled 5 · 2026</div>

    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Date</div>
        <div class="info-value highlight">23 June 2026</div>
      </div>
      <div class="info-item">
        <div class="info-label">Time</div>
        <div class="info-value">4:00 PM – 7:30 PM</div>
      </div>
      <div class="info-item">
        <div class="info-label">Venue</div>
        <div class="info-value">Auditorium</div>
      </div>
      <div class="info-item">
        <div class="info-label">Director</div>
        <div class="info-value">Naseem Abbas</div>
      </div>
    </div>
  </div>

  <div class="ticket-bottom">
    <div class="name-section">
      <div class="name-label">E-Ticket Pass</div>
      <div class="attendee-name blank" contenteditable="true" spellcheck="false" 
           onfocus="if(this.innerText.trim()==='Your Name Here'){this.innerText=''; this.classList.remove('blank');}" 
           onblur="if(this.innerText.trim()===''){this.innerText='Your Name Here'; this.classList.add('blank');}">Your Name Here</div>
    </div>

    <div class="welcome-msg">We welcome you to join this incredible performance!</div>

    <div class="barcode">Legislative2026</div>
    <div class="ticket-id">TKT-LT2026-0001</div>
  </div>

</div>

<div class="actions">
  <button class="btn btn-primary" onclick="window.print()">Print Ticket</button>
  <button class="btn btn-outline" onclick="window.print()">Save PDF</button>
</div>

</body>
</html>
